<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yılan</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111827;color:#e5e7eb;font:16px system-ui}.wrap{text-align:center}h1{margin:0 0 8px}.hud{margin:0 0 10px;color:#9ca3af}.hud b{color:#fff}canvas{display:block;background:#1f2937;border:3px solid #374151;border-radius:8px;max-width:90vw;height:auto}.hint{color:#9ca3af;font-size:13px}
</style>
</head>
<body>
<main class="wrap">
<h1>Yılan</h1>
<p class="hud">Skor: <b id="score">0</b></p>
<canvas id="game" width="400" height="400" aria-label="Yılan oyun alanı"></canvas>
<p class="hint">Ok tuşlarıyla oyna · Kaybedince Enter veya Boşluk ile yeniden başlat</p>
</main>
<script>
const canvas=document.querySelector('#game'),ctx=canvas.getContext('2d'),scoreEl=document.querySelector('#score');
const size=20,cells=canvas.width/size,keys={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
let snake,food,direction,nextDirection,score,over;
function placeFood(){
  do food={x:Math.floor(Math.random()*cells),y:Math.floor(Math.random()*cells)};
  while(snake.some(p=>p.x===food.x&&p.y===food.y));
}
function reset(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];direction=nextDirection=[1,0];score=0;over=false;
  scoreEl.textContent=score;placeFood();draw();
}
function draw(){
  ctx.fillStyle='#1f2937';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#ef4444';ctx.fillRect(food.x*size+2,food.y*size+2,size-4,size-4);
  snake.forEach((p,i)=>{ctx.fillStyle=i?'#22c55e':'#86efac';ctx.fillRect(p.x*size+1,p.y*size+1,size-2,size-2)});
  if(over){ctx.fillStyle='#000a';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.font='bold 28px system-ui';ctx.textAlign='center';ctx.fillText('Oyun bitti!',200,190);ctx.font='16px system-ui';ctx.fillText('Enter veya Boşluk',200,220)}
}
function tick(){
  if(over)return;direction=nextDirection;
  const head={x:snake[0].x+direction[0],y:snake[0].y+direction[1]},eat=head.x===food.x&&head.y===food.y;
  const body=eat?snake:snake.slice(0,-1),hitWall=head.x<0||head.y<0||head.x>=cells||head.y>=cells;
  if(hitWall||body.some(p=>p.x===head.x&&p.y===head.y)){over=true;draw();return}
  snake.unshift(head);if(eat){scoreEl.textContent=++score;placeFood()}else snake.pop();draw();
}
addEventListener('keydown',e=>{
  if(over&&(e.key==='Enter'||e.code==='Space')){e.preventDefault();reset();return}
  if(!keys[e.key])return;e.preventDefault();const wanted=keys[e.key];
  if(wanted[0]!==-direction[0]||wanted[1]!==-direction[1])nextDirection=wanted;
});
reset();setInterval(tick,110);
</script>
</body></html>
